<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEDParse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🧬 GEDParse</h1>
            <p class="subtitle">GEDCOM 5.5.1 → 7.0 Migration</p>
        </header>

        <main>
            <div class="toolbar">
                <button id="btnLoad" class="btn primary">📂 Загрузить GEDCOM</button>
                <button id="btnValidate" class="btn secondary" disabled>🔍 Проверить</button>
                <button id="btnConvert" class="btn success" disabled>🔄 Конвертировать</button>
                <button id="btnExport" class="btn warning" disabled>💾 Экспорт</button>
            </div>

            <div id="status" class="status">Ожидание загрузки...</div>

            <div class="stats" id="stats" style="display:none;">
                <span id="recordCount">0</span> записей
                <span id="warningCount" style="margin-left:16px;">⚠️ 0</span>
            </div>

            <div class="table-container">
                <table id="gedcomTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Тип</th>
                            <th>Поля</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="3" class="empty-state">Загрузите GEDCOM файл для просмотра</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
