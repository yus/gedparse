<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEDParse</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Capacitor -->
    <script src="capacitor.js"></script>
    <script src="js/lib/capacitor-core.js"></script>
    <script src="js/lib/capacitor-filesystem.js"></script>
    
    <!-- vis-network -->
    <link rel="stylesheet" href="js/lib/vis-network.min.css">
    <script src="js/lib/vis-network.min.js"></script>
    
    <!-- html2canvas (для экспорта графа) -->
    <script src="js/lib/html2canvas.min.js"></script>
    
    <script src="js/GedcomField.js"></script>
    <script src="js/GedcomRecord.js"></script>
    <script src="js/DateUtils.js"></script>
    <script src="js/GedcomParser.js"></script>
    <script src="js/GedcomConverter.js"></script>
    <script src="js/MigrationValidator.js"></script>
    <script src="js/capacitor/FilePicker.js"></script>
    
    <style>
        /* ... предыдущие стили ... */
        
        /* Стили для карточки персоны */
        #person-card {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: none;
            z-index: 500;
            border-left: 4px solid #4CAF50;
        }
        #person-card h3 { margin: 0 0 8px 0; color: #333; }
        #person-card .field { margin: 4px 0; font-size: 14px; }
        #person-card .field strong { color: #666; }
        #person-card .close-card { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
        #person-card .close-card:hover { color: #333; }
        
        /* Стили для редактора */
        #editor-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #editor-modal .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 90%;
            width: 600px;
            max-height: 80%;
            overflow-y: auto;
        }
        #editor-modal .modal-content textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
            font-size: 13px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #editor-modal .modal-content .field-row {
            display: flex;
            gap: 8px;
            margin: 4px 0;
            align-items: center;
        }
        #editor-modal .modal-content .field-row input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        /* Граф контейнер */
        #graph-fullscreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 1500;
            display: none;
            flex-direction: column;
        }
        #graph-fullscreen .graph-header {
            padding: 12px 20px;
            background: #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        #graph-fullscreen .graph-header button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #graph-fullscreen #graph-container-full {
            flex: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <button id="menuBtn" style="background:none;border:none;font-size:28px;cursor:pointer;position:absolute;left:16px;top:16px;">☰</button>
            <h1>🧬 GEDParse</h1>
            <p class="subtitle">GEDCOM 5.5.1 ↔ 7.0 Migration</p>
        </header>

        <main>
            <div id="status" class="status">🚀 Откройте меню ☰ и выберите файл</div>

            <div class="stats" id="stats" style="display:none;">
                <span id="recordCount">0</span> записей
                <span id="warningCount" style="margin-left:16px;">⚠️ 0</span>
            </div>

            <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
                <button id="btnGraph" class="drawer-btn purple" style="display:none;width:auto;">📊 Граф семьи</button>
                <button id="btnEdit" class="drawer-btn secondary" style="display:none;width:auto;">✏️ Редактировать</button>
            </div>

            <div class="table-container">
                <table id="gedcomTable">
                    <thead>
                        <tr><th>#</th><th>ID</th><th>Type</th><th>Fields</th><th>Version</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="empty-state">Загрузите GEDCOM файл через меню ☰</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- DRAWER -->
            <div id="drawer">
                <div id="drawer-content">
                    <button class="drawer-close" id="drawerClose">✕</button>
                    <h2>📋 Меню</h2>
                    <div id="drawerBody"></div>
                </div>
            </div>

            <!-- КАРТОЧКА ПЕРСОНЫ -->
            <div id="person-card">
                <button class="close-card" onclick="document.getElementById('person-card').style.display='none'">✕</button>
                <h3 id="person-name">Имя</h3>
                <div id="person-details"></div>
            </div>

            <!-- РЕДАКТОР -->
            <div id="editor-modal">
                <div class="modal-content">
                    <h3>✏️ Редактор записи</h3>
                    <div id="editor-body"></div>
                    <div style="margin-top:12px;display:flex;gap:8px;">
                        <button id="editor-save" class="drawer-btn primary" style="width:auto;">💾 Сохранить</button>
                        <button id="editor-close" class="drawer-btn gray" style="width:auto;">✕ Закрыть</button>
                    </div>
                </div>
            </div>

            <!-- ГРАФ В ПОЛНЫЙ ЭКРАН -->
            <div id="graph-fullscreen">
                <div class="graph-header">
                    <span style="font-weight:bold;">📊 Семейное древо</span>
                    <div>
                        <button id="graph-export-png" style="background:#4CAF50;color:white;">⬇️ PNG</button>
                        <button id="graph-close" style="background:#f44336;color:white;">✕ Закрыть</button>
                    </div>
                </div>
                <div id="graph-container-full"></div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/check.js"></script>
</body>
</html>
