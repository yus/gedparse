<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEDParse</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="capacitor.js"></script>
    <script src="js/lib/capacitor-core.js"></script>
    <script src="js/lib/capacitor-filesystem.js"></script>
    
    <!-- vis-network для графов -->
    <link rel="stylesheet" href="js/lib/vis-network.min.css">
    <script src="js/lib/vis-network.min.js"></script>
    
    <script src="js/GedcomField.js"></script>
    <script src="js/GedcomRecord.js"></script>
    <script src="js/DateUtils.js"></script>
    <script src="js/GedcomParser.js"></script>
    <script src="js/GedcomConverter.js"></script>
    <script src="js/MigrationValidator.js"></script>
    <script src="js/capacitor/FilePicker.js"></script>
    
    <style>
        /* Стили для drawer */
        #drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #drawer-content { background: white; border-radius: 16px; padding: 24px; max-width: 90%; width: 400px; max-height: 80%; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .drawer-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; }
        .drawer-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; text-align: left; }
        .drawer-btn.primary { background: #4CAF50; color: white; }
        .drawer-btn.secondary { background: #2196F3; color: white; }
        .drawer-btn.warning { background: #FF9800; color: white; }
        .drawer-btn.danger { background: #f44336; color: white; }
        .drawer-btn.purple { background: #9C27B0; color: white; }
        .drawer-btn.gray { background: #9e9e9e; color: white; }
        
        /* Бейджи */
        .badge-551 { background: #ff9800; color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .badge-700 { background: #4caf50; color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .badge-unknown { background: #9e9e9e; color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        
        /* Таблица с прокруткой */
        .table-container { overflow-x: auto; overflow-y: auto; max-height: 70vh; width: 100%; }
        #gedcomTable { display: block; overflow-x: auto; white-space: nowrap; width: 100%; border-collapse: collapse; }
        #gedcomTable th, #gedcomTable td { padding: 8px 12px; border: 1px solid #ddd; min-width: 80px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
        #gedcomTable th { background: #f5f5f5; position: sticky; top: 0; z-index: 10; }
        
        /* Контейнер для графа */
        #graph-container { width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 8px; margin-top: 16px; background: #fafafa; display: none; }
        
        /* Кнопка графа */
        #btnGraph { display: none; }
        .file-item { padding: 10px; margin: 4px 0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .file-item:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <button id="menuBtn" style="background:none;border:none;font-size:28px;cursor:pointer;position:absolute;left:16px;top:16px;">☰</button>
            <h1>🧬 GEDParse</h1>
            <p class="subtitle">GEDCOM 5.5.1 ↔ 7.0 Migration</p>
        </header>

        <main>
            <div id="status" class="status">🚀 Откройте меню ☰ и выберите файл</div>

            <div class="stats" id="stats" style="display:none;">
                <span id="recordCount">0</span> записей
                <span id="warningCount" style="margin-left:16px;">⚠️ 0</span>
            </div>

            <!-- Кнопка графа -->
            <button id="btnGraph" class="drawer-btn purple" style="margin-bottom:8px;">📊 Показать граф семьи</button>

            <!-- Таблица -->
            <div class="table-container">
                <table id="gedcomTable">
                    <thead>
                        <tr><th>#</th><th>ID</th><th>Type</th><th>Version</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="4" class="empty-state">Загрузите GEDCOM файл через меню ☰</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Граф -->
            <div id="graph-container"></div>

            <!-- DRAWER -->
            <div id="drawer">
                <div id="drawer-content">
                    <button class="drawer-close" id="drawerClose">✕</button>
                    <h2>📋 Меню</h2>
                    <div id="drawerBody"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/check.js"></script>
</body>
</html>
