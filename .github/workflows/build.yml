name: Build Capacitor Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    
    - name: Enable Corepack
      run: corepack enable
    
    - name: Install dependencies
      run: yarn install --no-immutable
    
    - name: Install dependencies and Capacitor
      run: |
        npm install --no-audit --no-fund --legacy-peer-deps
        npm install -D @capacitor/cli @capacitor/android @capacitor/core @capacitor/filesystem
    
    - name: Build Android APK
      run: |
        # Удаляем старые конфиги
        rm -rf android capacitor.config.json node_modules/.cache
    
        # Устанавливаем Capacitor заново
        npm install -D @capacitor/cli @capacitor/android @capacitor/core
    
        # Инициализируем
        npx cap init gedparse com.yus.gedparse --web-dir=www
    
        # Добавляем Android
        npx cap add android
    
        # Синхронизируем
        npx cap sync
    
        # Собираем
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gedparse-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create release APK
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: android/app/build/outputs/apk/debug/app-debug.apk
        asset_name: gedparse-v${{ github.ref_name }}.apk
        asset_content_type: application/vnd.android.package-archive
