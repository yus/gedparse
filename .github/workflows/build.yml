name: Build Capacitor Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    
    - name: Enable Corepack
      run: corepack enable
    
    # Удаляем package-lock.json (на всякий случай)
    - name: Remove npm lock file
      run: rm -f package-lock.json
    
    - name: Install dependencies with Yarn
      run: yarn install --no-immutable
    
    - name: Build Android APK
      run: |
        # Очищаем старые конфиги
        rm -rf android capacitor.config.json
        
        # Устанавливаем Capacitor
        yarn add @capacitor/android @capacitor/core @capacitor/filesystem
        
        # Инициализируем
        yarn cap init gedparse com.yus.gedparse --web-dir=www
        
        # Добавляем Android
        yarn cap add android
        
        # Синхронизируем
        yarn cap sync
        
        # Собираем APK
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gedparse-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
