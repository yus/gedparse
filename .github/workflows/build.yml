name: Build Capacitor Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    
    - name: Enable Corepack
      run: corepack enable
    
    - name: Install dependencies with Yarn
      run: yarn install --no-immutable
    
    - name: Build Android APK
      run: |
        # Очищаем старые конфиги
        rm -rf android capacitor.config.json
    
        # Устанавливаем Capacitor
        yarn add @capacitor/android @capacitor/core @capacitor/filesystem
    
        # Инициализируем и добавляем Android
        yarn cap init gedparse com.yus.gedparse --web-dir=www
        yarn cap add android
    
        # ПРАВИЛЬНЫЙ ПОРЯДОК: сначала обновляем Gradle
        cd android
        chmod +x gradlew
        ./gradlew wrapper --gradle-version 8.7
        cd ..
    
        # Теперь синхронизируем
        yarn cap sync
    
        # Собираем
        cd android
        ./gradlew assembleDebug --no-daemon 
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gedparse-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create release APK
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: android/app/build/outputs/apk/debug/app-debug.apk
        asset_name: gedparse-v${{ github.ref_name }}.apk
        asset_content_type: application/vnd.android.package-archive
