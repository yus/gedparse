name: Build Capacitor Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    
    - name: Install dependencies
      run: |
        npm install --no-audit --no-fund --legacy-peer-deps
        npm install -D @capacitor/cli
        npm install @capacitor/android @capacitor/core @capacitor/filesystem
    
    - name: Build Android APK
      run: |
        # Удаляем старую android папку (если есть)
        rm -rf android capacitor.config.json
        
        npx cap init gedparse com.yus.gedparse --web-dir=www
        npx cap add android
        npx cap sync
        
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gedparse-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
