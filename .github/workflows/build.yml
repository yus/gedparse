name: Build Capacitor Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    
    - name: Enable Corepack
      run: corepack enable
    
    - name: Install dependencies
      run: yarn install
      
    - name: Build Android APK
      run: |
        # Полностью удаляем Android проект
        rm -rf android capacitor.config.json
    
        # Переустанавливаем Capacitor
        yarn add @capacitor/android @capacitor/core @capacitor/filesystem
    
        # Инициализируем заново
        yarn cap init gedparse com.yus.gedparse --web-dir=www
        yarn cap add android
        yarn cap sync
    
        # Собираем
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
       
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gedparse-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
