name: Build Capacitor Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    
    - name: Enable Corepack
      run: corepack enable
    
    - name: Install dependencies
      run: yarn install --no-immutable
    
    # Кэшируем Gradle зависимости
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches/
          ~/.gradle/wrapper/
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build Android APK
      run: |
        # Синхронизируем
        yarn cap sync
        
        # Собираем с увеличенным таймаутом
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --max-workers=2 --parallel --build-cache
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gedparse-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
